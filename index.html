<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<title>School Staff</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f4f7;
}

.header{
background:#1976d2;
color:white;
padding:15px;
font-size:20px;
}

.container{
padding:10px;
}

.card{
background:white;
margin:10px 0;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
cursor:pointer;
}

button{
background:#1976d2;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
margin-bottom:10px;
}

.loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:bold;
z-index:999;
}

</style>

</head>

<body>

<div class="loading" id="loading">
Loading Data...
</div>

<div class="header" id="title">
Schools
</div>

<div class="container" id="app"></div>

<script>

const SHEET_ID = "1sVNq8pNMwhHjTdOCXF5H3rWGbUqEs1Jr3AfJhvrf9vA";

let data=[];

function loadSheet(){

let url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

fetch(url)
.then(res=>res.text())
.then(text=>{

let json=JSON.parse(text.substr(47).slice(0,-2));

let rows=json.table.rows;
let cols=json.table.cols.map(c=>c.label);

data=rows.map(r=>{

let obj={};

r.c.forEach((cell,i)=>{
obj[cols[i]]=cell?cell.v:"";
});

return obj;

});

document.getElementById("loading").style.display="none";

showSchools();

});

}

function showSchools(){

document.getElementById("title").innerText="Schools";

let schools={};

data.forEach(r=>{
schools[r["School Code"]]=r["School Name"];
});

let html="";

Object.keys(schools).forEach(code=>{

html+=`
<div class="card" onclick="showStaff('${code}')">
🏫 ${schools[code]}
</div>
`;

});

document.getElementById("app").innerHTML=html;

}

function showStaff(code){

let staff=data.filter(r=>r["School Code"]==code);

document.getElementById("title").innerText=staff[0]["School Name"];

let html=`<button onclick="showSchools()">⬅ Back</button>`;

staff.forEach((s,i)=>{

html+=`
<div class="card" onclick="showProfile(${i},'${code}')">
👤 ${s["Name of Staff"]}<br>
${s["Nature Of Post"]}
</div>
`;

});

document.getElementById("app").innerHTML=html;

}

function showProfile(index,code){

let staff=data.filter(r=>r["School Code"]==code);

let s=staff[index];

document.getElementById("title").innerText="Profile";

let html=`
<button onclick="showStaff('${code}')">⬅ Back</button>

<div class="card">

<b>Name:</b> ${s["Name of Staff"]}<br><br>

<b>Gender:</b> ${s["Gender"]}<br><br>

<b>DOB:</b> ${s["Date of Birth (dd/mm/yyyy)"]}<br><br>

<b>Post:</b> ${s["Nature Of Post"]}<br><br>

<b>Category:</b> ${s["Category of Post"]}<br><br>

<b>Community:</b> ${s["Community"]}<br><br>

<b>Mobile:</b> ${s["Mobile No"]}<br><br>

<b>Status:</b> ${s["Status"]}

</div>
`;

document.getElementById("app").innerHTML=html;

}

loadSheet();

</script>

</body>
</html>
