<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>School Staff Directory</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f2f4f7;
}

.header{
background:#1976d2;
color:white;
padding:15px;
font-size:20px;
display:flex;
align-items:center;
justify-content:space-between;
}

.search-input{
padding:8px;
border-radius:8px;
border:none;
width:60%;
font-size:16px;
}

.container{
padding:10px;
}

.card{
background:white;
margin:10px 0;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.02);
}

.hm{
border-left:4px solid #ff5722;
padding-left:10px;
position:relative;
}

.hm::before{
content:"👑";
position:absolute;
left:-25px;
top:5px;
font-size:18px;
}

.button-back{
background:#1976d2;color:white;border:none;padding:8px 12px;border-radius:8px;margin-bottom:10px;
}

.loading{
position:fixed;top:0;left:0;width:100%;height:100%;background:white;
display:flex;justify-content:center;align-items:center;font-size:22px;font-weight:bold;z-index:999;
}

.staff-count{
font-size:12px;color:#555;margin-left:10px;
}
</style>

</head>
<body>

<div class="loading" id="loading">Loading Data...</div>

<div class="header">
<span id="title">Schools</span>
<input type="text" id="search" class="search-input" placeholder="Search..." oninput="filterList()">
</div>

<div class="container" id="app"></div>

<script>
const SHEET_ID="1sVNq8pNMwhHjTdOCXF5H3rWGbUqEs1Jr3AfJhvrf9vA";
const SHEET_NAME="Teachers";

let data=[];
let filteredData=[];
let currentScreen="schools";
let currentSchoolCode="";
let currentStaffIndex=0;

// --- Load Sheet Data ---
function loadSheet(){
let url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;
fetch(url)
.then(res=>res.text())
.then(text=>{
let json=JSON.parse(text.substr(47).slice(0,-2));
let rows=json.table.rows;
let cols=json.table.cols.map(c=>c.label);
data=rows.map(r=>{
let obj={};
r.c.forEach((cell,i)=>{ obj[cols[i]]=cell?cell.v:""; });
return obj;
});
document.getElementById("loading").style.display="none";
currentScreen="schools";
filteredData=data;
showSchools();
});
}

// --- Display Schools ---
function showSchools(){
currentScreen="schools";
document.getElementById("title").innerText="Schools";
document.getElementById("search").value="";

let schoolsMap=new Map();
data.forEach(r=>schoolsMap.set(r["School Code"],r["School Name"]));

// calculate staff count & category breakdown
let schoolCounts={};
let schoolCategory={};
data.forEach(r=>{
let code=r["School Code"];
schoolCounts[code]=(schoolCounts[code]||0)+1;
schoolCategory[code]=schoolCategory[code]||{};
let cat=r["Category of Post"]||"Other";
schoolCategory[code][cat]=(schoolCategory[code][cat]||0)+1;
});

let html="";
for(let [code,name] of schoolsMap.entries()){
let count=schoolCounts[code]||0;
let catList="";
for(let cat in schoolCategory[code]){
catList+=`${cat}: ${schoolCategory[code][cat]}  `;
}
html+=`<div class="card" onclick="showStaff('${code}')">🏫 ${name} <span class="staff-count">(${count} staff)</span><br><small>${catList}</small></div>`;
}
document.getElementById("app").innerHTML=html;
}

// --- Display Staff ---
function showStaff(code){
currentScreen="staff";
currentSchoolCode=code;
document.getElementById("search").value="";
let staff=data.filter(r=>r["School Code"]==code);
document.getElementById("title").innerText=staff[0]?staff[0]["School Name"]:"Staff";
filteredData=staff;
let html=`<button class="button-back" onclick="showSchools()">⬅ Back</button>`;
staff.forEach((s,i)=>{
let hmClass=s["isActingHM"]?"hm":"";
html+=`<div class="card ${hmClass}" onclick="showProfile(${i})">👤 ${s["Name of Staff"]}<br>${s["Nature Of Post"]}</div>`;
});
document.getElementById("app").innerHTML=html;
}

// --- Display Profile ---
function showProfile(index){
currentScreen="profile";
currentStaffIndex=index;
let staff=filteredData;
let s=staff[index];
document.getElementById("title").innerText="Profile";
let hmHighlight=s["isActingHM"]?" (Acting HM)":"";
let html=`<button class="button-back" onclick="showStaff('${currentSchoolCode}')">⬅ Back</button>
<div class="card">
<b>Name:</b> ${s["Name of Staff"]}${hmHighlight}<br><br>
<b>Gender:</b> ${s["Gender"]}<br><br>
<b>DOB:</b> ${s["Date of Birth (dd/mm/yyyy)"]}<br><br>
<b>Post:</b> ${s["Nature Of Post"]}<br><br>
<b>Category:</b> ${s["Category of Post"]}<br><br>
<b>Community:</b> ${s["Community"]}<br><br>
<b>Mobile:</b> ${s["Mobile No"]}<br><br>
<b>Status:</b> ${s["Status"]}
</div>`;
document.getElementById("app").innerHTML=html;
}

// --- Search Filter ---
function filterList(){
let term=document.getElementById("search").value.toLowerCase();
if(currentScreen==="schools"){
let schoolsMap=new Map();
data.forEach(r=>schoolsMap.set(r["School Code"],r["School Name"]));
let schoolCounts={};
let schoolCategory={};
data.forEach(r=>{
let code=r["School Code"];
schoolCounts[code]=(schoolCounts[code]||0)+1;
schoolCategory[code]=schoolCategory[code]||{};
let cat=r["Category of Post"]||"Other";
schoolCategory[code][cat]=(schoolCategory[code][cat]||0)+1;
});
let html="";
for(let [code,name] of schoolsMap.entries()){
if(name.toLowerCase().includes(term)){
let count=schoolCounts[code]||0;
let catList="";
for(let cat in schoolCategory[code]){
catList+=`${cat}: ${schoolCategory[code][cat]}  `;
}
html+=`<div class="card" onclick="showStaff('${code}')">🏫 ${name} <span class="staff-count">(${count} staff)</span><br><small>${catList}</small></div>`;
}
}
document.getElementById("app").innerHTML=html;
}else if(currentScreen==="staff"){
let staff=filteredData.filter(s=>s["Name of Staff"].toLowerCase().includes(term));
let html=`<button class="button-back" onclick="showSchools()">⬅ Back</button>`;
staff.forEach((s,i)=>{
let hmClass=s["isActingHM"]?"hm":"";
html+=`<div class="card ${hmClass}" onclick="showProfile(${i})">👤 ${s["Name of Staff"]}<br>${s["Nature Of Post"]}</div>`;
});
document.getElementById("app").innerHTML=html;
}
}

// --- Initialize ---
loadSheet();

</script>

</body>
</html>
